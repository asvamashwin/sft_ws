syntax = "proto3";

package med_sentinel;

// Timestamp with nanosecond precision for latency measurement
message Timestamp {
  int64 seconds = 1;
  int32 nanos   = 2;
}

// 3D vector for positions and forces
message Vector3 {
  double x = 1;
  double y = 2;
  double z = 3;
}

// Quaternion in (w, x, y, z) convention
message Quaternion {
  double w = 1;
  double x = 2;
  double y = 3;
  double z = 4;
}

// 6-DOF pose
message Pose {
  Vector3    position    = 1;
  Quaternion orientation = 2;
}

// Per-joint state snapshot
message JointState {
  repeated string name     = 1;
  repeated double position = 2;  // radians
  repeated double velocity = 3;  // rad/s
  repeated double effort   = 4;  // Nm
}

// End-effector state
message EndEffectorState {
  Pose   pose            = 1;
  Vector3 linear_velocity  = 2;
  Vector3 angular_velocity = 3;
}

enum RobotStatus {
  ROBOT_STATUS_UNKNOWN  = 0;
  ROBOT_STATUS_IDLE     = 1;
  ROBOT_STATUS_MOVING   = 2;
  ROBOT_STATUS_ERROR    = 3;
  ROBOT_STATUS_ESTOPPED = 4;
}

// Full robot state published at 100Hz from Isaac Sim
message RobotState {
  Timestamp        stamp           = 1;
  uint64           sequence        = 2;
  string           robot_name      = 3;
  JointState       joint_state     = 4;
  EndEffectorState end_effector    = 5;
  Pose             base_pose       = 6;
  RobotStatus      status          = 7;
  double           sim_time        = 8;  // Isaac Sim world time in seconds
}

enum ControlMode {
  CONTROL_MODE_POSITION = 0;
  CONTROL_MODE_VELOCITY = 1;
  CONTROL_MODE_EFFORT   = 2;
}

// Command sent from web client to the robot
message ControlCommand {
  Timestamp       stamp          = 1;
  uint64          sequence       = 2;
  ControlMode     mode           = 3;
  repeated double joint_targets  = 4;  // position (rad), velocity (rad/s), or effort (Nm)
  double          max_velocity   = 5;  // scaling factor [0.0 - 1.0]
  double          max_accel      = 6;  // scaling factor [0.0 - 1.0]
  bool            stop           = 7;  // emergency stop flag
}

// Latency measurement echoed back from server
message PingPong {
  Timestamp client_send  = 1;
  Timestamp server_recv  = 2;
  Timestamp server_send  = 3;
  uint64    sequence      = 4;
}

// ISO 15066 safety zone classification
enum SafetyZone {
  ZONE_GREEN  = 0;  // full speed -- human far away
  ZONE_YELLOW = 1;  // scaled speed -- human approaching
  ZONE_RED    = 2;  // protective stop -- human too close
}

// Real-time safety state streamed at 100Hz alongside RobotState
message SafetyState {
  Timestamp stamp             = 1;
  uint64    sequence          = 2;
  double    d_min             = 3;   // minimum human-robot distance (m)
  double    S_p               = 4;   // protective separation distance (m)
  double    velocity_scale    = 5;   // applied scaling factor [0.0 - 1.0]
  string    closest_link      = 6;   // robot link nearest to human
  string    closest_human     = 7;   // human joint nearest to robot
  SafetyZone zone             = 8;
  double    max_contact_force = 9;   // peak contact force this step (N)
  bool      protective_stop   = 10;  // true if robot is stopped for safety
  double    v_robot           = 11;  // robot Cartesian speed at closest link (m/s)
  double    v_human           = 12;  // human speed at closest joint (m/s)
}

// Logged per-test safety validation result
message SafetyTestResult {
  string    test_name         = 1;
  bool      passed            = 2;
  double    stop_time_ms      = 3;   // time from trigger to full stop
  double    force_at_impact_N = 4;
  double    d_min_at_stop     = 5;   // distance when stop completed
  double    v_max_at_trigger  = 6;   // robot speed when stop triggered
  repeated SafetyState trace  = 7;   // full safety state timeline
}
